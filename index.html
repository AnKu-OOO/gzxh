<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>广州新华学院 · 新华码</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f2f2f7;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 0;
            margin: 0;
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            background: #f2f2f7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            position: relative;
        }

        .navbar {
            background: #ffffff;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 0.5px solid #e0e0e0;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .back-btn {
            font-size: 28px;
            color: #000;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
            user-select: none;
            line-height: 1;
        }
        .back-btn:active {
            background: #f0f0f0;
        }

        .nav-spacer {
            flex: 1;
        }

        .more-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            width: 36px;
            height: 36px;
            cursor: pointer;
            border-radius: 50%;
            transition: background 0.2s;
        }
        .more-btn:active {
            background: #f0f0f0;
        }
        .more-dot {
            width: 4px;
            height: 4px;
            background: #000;
            border-radius: 50%;
        }

        .main-content {
            flex: 1;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .profile-card {
            display: flex;
            align-items: center;
        }

        .avatar {
            width: 44px;
            height: 28px;
            background: #1976d2;
            border-radius: 6px 6px 10px 10px;
            position: relative;
            margin-right: 14px;
            margin-top: 12px;
            flex-shrink: 0;
        }
        .avatar::before {
            content: '';
            width: 24px;
            height: 24px;
            background: #1976d2;
            border-radius: 50%;
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
        }

        .profile-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .profile-name {
            font-size: 18px;
            font-weight: 700;
            color: #000;
        }

        .profile-detail {
            font-size: 14px;
            color: #888;
            line-height: 1.4;
        }

        .verified-tag {
            background: #e8f5e9;
            border-radius: 20px;
            padding: 6px 14px;
            display: flex;
            align-items: center;
            gap: 5px;
            color: #2e7d32;
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            flex-shrink: 0;
            margin-left: 8px;
        }
        .verified-tag .check-icon {
            font-size: 16px;
            line-height: 1;
            color: #2e7d32;
            font-weight: bold;
        }

        .qr-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .qr-title {
            font-size: 17px;
            font-weight: 700;
            color: #000;
        }
        .refresh-btn {
            color: #1976d2;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            user-select: none;
            padding: 6px 12px;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .refresh-btn:active {
            background: #e3f2fd;
        }

        .qrcode-container {
            display: flex;
            justify-content: center;
            margin-bottom: 8px;
            padding: 10px 0;
        }

        /* 二维码网格 */
        .qr-grid {
            width: 260px;
            height: 260px;
            display: grid;
            grid-template-columns: repeat(21, 1fr);
            grid-template-rows: repeat(21, 1fr);
            background: #fff;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
        }

        .qr-cell {
            background: #fff;
        }

        .qr-cell.dark {
            background: #000;
        }

        .qr-desc {
            text-align: center;
            color: #888;
            font-size: 14px;
            line-height: 1.8;
            margin-top: 0;
        }
        .qr-desc .countdown {
            font-weight: 500;
            color: #555;
        }

        .footer {
            padding: 24px 16px 20px;
            text-align: center;
            font-size: 11px;
            color: #aaaaaa;
            letter-spacing: 0.5px;
        }

        .toast {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.78);
            color: #fff;
            padding: 10px 22px;
            border-radius: 22px;
            font-size: 14px;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="navbar">
            <span class="back-btn" id="backBtn">←</span>
            <span class="nav-spacer"></span>
            <span class="more-btn" id="moreBtn">
                <span class="more-dot"></span>
                <span class="more-dot"></span>
                <span class="more-dot"></span>
            </span>
        </div>

        <div class="main-content">
            <div class="card profile-card">
                <div class="avatar"></div>
                <div class="profile-info">
                    <div class="profile-name">李智宇</div>
                    <div class="profile-detail">25052171</div>
                    <div class="profile-detail">25计算机科学与技术5班</div>
                </div>
                <div class="verified-tag">
                    <span class="check-icon">✓</span> 已认证
                </div>
            </div>

            <div class="card">
                <div class="qr-header">
                    <span class="qr-title">广州新华学院</span>
                    <span class="refresh-btn" id="refreshBtn">刷新</span>
                </div>
                <div class="qrcode-container">
                    <!-- 二维码A -->
                    <div class="qr-grid" id="qrA"></div>
                    <!-- 二维码B -->
                    <div class="qr-grid hidden" id="qrB"></div>
                </div>
                <div class="qr-desc">
                    <div>扫描二维码开门</div>
                    <div class="countdown" id="countdownDisplay">有效期剩余: 00:59</div>
                </div>
            </div>
        </div>

        <div class="footer">
            © 2025 新华码 | 广州新华学院信息与网络中心
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        window.onload = function() {

            var modules = 21;
            var currentQR = 0; // 0=A, 1=B

            // 判断是否在定位图案区域
            function isInFinder(row, col) {
                if (row < 7 && col < 7) return true;
                if (row < 7 && col >= 14) return true;
                if (row >= 14 && col < 7) return true;
                return false;
            }

            // 判断是否在定位图案的外框
            function isFinderOuter(row, col, startRow, startCol) {
                var r = row - startRow;
                var c = col - startCol;
                return (r === 0 || r === 6 || c === 0 || c === 6);
            }

            // 判断是否在定位图案的内核
            function isFinderInner(row, col, startRow, startCol) {
                var r = row - startRow;
                var c = col - startCol;
                return (r >= 2 && r <= 4 && c >= 2 && c <= 4);
            }

            // 检查任意定位图案的外框
            function inAnyFinderOuter(row, col) {
                if (row < 7 && col < 7 && isFinderOuter(row, col, 0, 0)) return true;
                if (row < 7 && col >= 14 && isFinderOuter(row, col, 0, 14)) return true;
                if (row >= 14 && col < 7 && isFinderOuter(row, col, 14, 0)) return true;
                return false;
            }

            // 检查任意定位图案的内核
            function inAnyFinderInner(row, col) {
                if (row < 7 && col < 7 && isFinderInner(row, col, 0, 0)) return true;
                if (row < 7 && col >= 14 && isFinderInner(row, col, 0, 14)) return true;
                if (row >= 14 && col < 7 && isFinderInner(row, col, 14, 0)) return true;
                return false;
            }

            // 生成二维码网格
            function buildQRGrid(containerId, seed) {
                var container = document.getElementById(containerId);
                container.innerHTML = '';
                for (var row = 0; row < modules; row++) {
                    for (var col = 0; col < modules; col++) {
                        var cell = document.createElement('div');
                        cell.className = 'qr-cell';
                        var dark = false;

                        if (inAnyFinderOuter(row, col) || inAnyFinderInner(row, col)) {
                            dark = true;
                        } else if (!isInFinder(row, col)) {
                            var rand = ((row * 31 + col * 17 + seed) % 100) / 100;
                            if (rand < 0.38) {
                                dark = true;
                            }
                        }

                        if (dark) {
                            cell.classList.add('dark');
                        }
                        container.appendChild(cell);
                    }
                }
            }

            // 显示当前二维码
            function showCurrentQR() {
                var qrA = document.getElementById('qrA');
                var qrB = document.getElementById('qrB');
                if (currentQR === 0) {
                    qrA.classList.remove('hidden');
                    qrB.classList.add('hidden');
                } else {
                    qrA.classList.add('hidden');
                    qrB.classList.remove('hidden');
                }
            }

            // 倒计时
            var countdownEl = document.getElementById('countdownDisplay');
            var remaining = 59;
            var timer = null;

            function updateDisplay() {
                var m = Math.floor(remaining / 60);
                var  = remaining % 60;
                countdownEl.textContent = '有效期剩余: ' + (m<10?'0'+m:'') + ':' + (<10?'0'+:'') + ;
            }

            // 修复显示格式
            function updateDisplayFixed() {
                var m = Math.floor(remaining / 60);
                var  = remaining % 60;
                var mm = m < 10 ? '0' + m : '' + m;
                var ss =  < 10 ? '0' +  : '' + ;
                countdownEl.textContent = '有效期剩余: ' + mm + ':' + ss;
            }

            function startTimer() {
                if (timer) clearInterval(timer);
                remaining = 59;
                updateDisplayFixed();
                countdownEl.style.color = '#555';
                timer = setInterval(function(){
                    remaining--;
                    updateDisplayFixed();
                    if (remaining <= 0) {
                        clearInterval(timer);
                        timer = null;
                        countdownEl.style.color = '#bbb';
                    }
                }, 1000);
            }

            // 刷新
            function refreshCode() {
                currentQR = currentQR === 0 ? 1 : 0;
                showCurrentQR();
                startTimer();
            }

            document.getElementById('refreshBtn').onclick = refreshCode;

            function showToast(msg) {
                var toast = document.getElementById('toast');
                toast.textContent = msg;
                toast.classList.add('show');
                setTimeout(function(){
                    toast.classList.remove('show');
                }, 1500);
            }

            document.getElementById('backBtn').onclick = function(){
                showToast('返回上一页');
            };

            document.getElementById('moreBtn').onclick = function(){
                showToast('更多功能开发中');
            };

            // 生成两个二维码
            buildQRGrid('qrA', 1357);
            buildQRGrid('qrB', 2468);
            showCurrentQR();
            startTimer();
        };
    </script>
</body>
</html>
