<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>新华码 v4</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, sans-serif;
            background: #f2f2f7;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .app {
            width: 100%;
            max-width: 420px;
            background: #f2f2f7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .navbar {
            background: #fff; padding: 12px 16px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 0.5px solid #e0e0e0;
        }
        .back-btn { font-size: 28px; cursor: pointer; }
        .nav-spacer { flex: 1; }
        .more-btn { display: flex; flex-direction: column; gap: 3px; }
        .more-dot { width: 4px; height: 4px; background: #000; border-radius: 50%; }
        .main { padding: 16px; display: flex; flex-direction: column; gap: 16px; flex: 1; }
        .card {
            background: #fff; border-radius: 16px; padding: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .profile-card { display: flex; align-items: center; }
        .avatar {
            width: 44px; height: 28px; background: #1976d2;
            border-radius: 6px 6px 10px 10px; position: relative;
            margin-right: 14px; margin-top: 12px; flex-shrink: 0;
        }
        .avatar::before {
            content: ''; width: 24px; height: 24px; background: #1976d2;
            border-radius: 50%; position: absolute; top: -18px; left: 50%;
            transform: translateX(-50%);
        }
        .profile-info { flex: 1; }
        .profile-name { font-size: 18px; font-weight: 700; }
        .profile-detail { font-size: 14px; color: #888; line-height: 1.4; }
        .verified-tag {
            background: #e8f5e9; border-radius: 20px; padding: 6px 14px;
            display: flex; align-items: center; gap: 5px; color: #2e7d32;
            font-size: 13px; font-weight: 500; margin-left: 8px;
        }
        .qr-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 16px;
        }
        .qr-title { font-size: 17px; font-weight: 700; }
        .refresh-btn {
            color: #1976d2; font-size: 15px; font-weight: 500;
            padding: 6px 12px; border-radius: 8px; cursor: pointer;
        }
        .qr-box {
            display: flex; justify-content: center; margin-bottom: 6px;
        }
        canvas {
            display: block;
            width: 260px; height: 260px;
            border: 2px solid #e0e0e0; border-radius: 8px;
            background: #fff;
        }
        .qr-desc { text-align: center; color: #888; font-size: 14px; line-height: 1.8; }
        .countdown { font-weight: 500; color: #555; }
        .footer {
            padding: 20px 16px; text-align: center;
            font-size: 11px; color: #aaa; letter-spacing: 0.5px;
        }
        .version-tag {
            position: fixed; top: 5px; right: 8px;
            background: red; color: #fff; font-size: 10px;
            padding: 2px 6px; border-radius: 10px; z-index: 999;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="version-tag">v4</div>
    <div class="navbar">
        <span class="back-btn" id="backBtn">←</span>
        <span class="nav-spacer"></span>
        <span class="more-btn" id="moreBtn">
            <span class="more-dot"></span><span class="more-dot"></span><span class="more-dot"></span>
        </span>
    </div>

    <div class="main">
        <div class="card profile-card">
            <div class="avatar"></div>
            <div class="profile-info">
                <div class="profile-name">李智宇</div>
                <div class="profile-detail">25052171</div>
                <div class="profile-detail">25计算机科学与技术5班</div>
            </div>
            <div class="verified-tag">✓ 已认证</div>
        </div>

        <div class="card">
            <div class="qr-header">
                <span class="qr-title">广州新华学院</span>
                <span class="refresh-btn" id="refreshBtn">刷新</span>
            </div>
            <div class="qr-box">
                <canvas id="qrCanvas" width="260" height="260"></canvas>
            </div>
            <div class="qr-desc">
                <div>扫描二维码开门</div>
                <div class="countdown" id="timer">有效期剩余: 00:59</div>
            </div>
        </div>
    </div>

    <div class="footer">© 2025 新华码 | 广州新华学院信息与网络中心</div>
</div>

<script>
    (function() {
        var canvas = document.getElementById('qrCanvas');
        var ctx = canvas.getContext('2d');
        var size = 260;
        var modules = 21;
        var moduleSize = size / modules;

        // 两个不同种子，对应两张码
        var seeds = [1357, 2468];
        var currentIndex = 0; // 0 或 1

        // 绘制定位图案
        function drawFinder(ctx, x, y) {
            ctx.fillStyle = '#000';
            ctx.fillRect(x, y, 7*moduleSize, 7*moduleSize);
            ctx.fillStyle = '#fff';
            ctx.fillRect(x+moduleSize, y+moduleSize, 5*moduleSize, 5*moduleSize);
            ctx.fillStyle = '#000';
            ctx.fillRect(x+2*moduleSize, y+2*moduleSize, 3*moduleSize, 3*moduleSize);
        }

        function isInFinder(row, col) {
            return (row < 7 && col < 7) || (row < 7 && col >= 14) || (row >= 14 && col < 7);
        }

        // 根据种子绘制完整二维码
        function drawQR(seed) {
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, size, size);

            // 三个定位图案
            drawFinder(ctx, 0, 0);
            drawFinder(ctx, size - 7*moduleSize, 0);
            drawFinder(ctx, 0, size - 7*moduleSize);

            // 数据区域
            for (var r = 0; r < modules; r++) {
                for (var c = 0; c < modules; c++) {
                    if (isInFinder(r, c)) continue;
                    var rand = (r * 31 + c * 17 + seed) % 100;
                    if (rand < 45) { // 45% 黑色，图案明显
                        ctx.fillStyle = '#000';
                        ctx.fillRect(c*moduleSize, r*moduleSize, moduleSize, moduleSize);
                    }
                }
            }
        }

        // 重绘当前码
        function refreshQR() {
            currentIndex = currentIndex === 0 ? 1 : 0;
            drawQR(seeds[currentIndex]);
            // 重置倒计时
            resetTimer();
        }

        // ---------- 倒计时 ----------
        var timerEl = document.getElementById('timer');
        var remaining = 59;
        var timerId = null;

        function formatTime() {
            var m = Math.floor( / 60);
            var sec =  % 60;
            return (m < 10 ? '0' + m : m) + ':' + (sec < 10 ? '0' + sec : sec);
        }

        function updateTimerDisplay() {
            timerEl.textContent = '有效期剩余: ' + formatTime(remaining);
        }

        function resetTimer() {
            if (timerId) clearInterval(timerId);
            remaining = 59;
            updateTimerDisplay();
            timerEl.style.color = '#555';
            timerId = setInterval(function() {
                remaining--;
                updateTimerDisplay();
                if (remaining <= 0) {
                    clearInterval(timerId);
                    timerId = null;
                    timerEl.style.color = '#bbb';
                }
            }, 1000);
        }

        // 初始化
        drawQR(seeds[0]);
        resetTimer();

        // 绑定刷新按钮
        document.getElementById('refreshBtn').addEventListener('click', refreshQR);

        // 顶部按钮
        document.getElementById('backBtn').addEventListener('click', function() {
            alert('返回上一页');
        });
        document.getElementById('moreBtn').addEventListener('click', function() {
            alert('更多功能');
        });
    })();
</script>
</body>
</html>
